<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post Job</title>

<link rel="stylesheet" href="{% static 'css/post_jobs.css' %}">
</head>

<body>

<header>
<nav>
<a href="{% url 'employer' %}">Dashboard</a>
</nav>
</header>

<div class="container">

<h2>Post New Job</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<label>Job Title</label>
<input type="text" name="title" required>

<label>Job Type</label>
<select name="job_type">
<option value="Government">Government</option>
<option value="Private">Private</option>
</select>

<label>Department</label>
<input type="text" name="department">

<label>Location</label>
<input type="text" name="location">

<label>Last date</label>
<input type="date" name="lastdate">

<label>Skills</label>
<input type="text" name="skills">

<!-- ✅ UPDATED -->
<label>Disability Type</label>
<select id="disability" name="disability_type">
<option value="">Select Disability</option>
<option value="physical">Physical</option>
<option value="visual">Visual</option>
<option value="hearing">Hearing</option>
</select>

<label>Disability Percent</label>
<input type="number" name="disability_percent">

<!-- ❌ REMOVE reservation -->

<!-- ✅ NEW -->
<label>Benefits for Disabled Candidates</label>
<ul id="suggestions"></ul>

<textarea id="benefitsBox" name="benefits" placeholder="Click suggestions to add"></textarea>

<label>Salary</label>
<input type="text" name="salary">

<label>Description</label>
<textarea name="description"></textarea>

<button type="submit">Post Job</button>

</form>

</div>

<!-- ✅ JAVASCRIPT -->
<script>
document.getElementById("disability").addEventListener("change", function() {
    let type = this.value;

    fetch(`/get-benefits/?disability=${type}`)
    .then(res => res.json())
    .then(data => {

        let list = document.getElementById("suggestions");
        list.innerHTML = "";

        data.suggestions.forEach(item => {
            let li = document.createElement("li");
            li.innerText = item;

            li.style.cursor = "pointer";

            li.onclick = function() {
                document.getElementById("benefitsBox").value += item + ", ";
            }

            list.appendChild(li);
        });

    });
});
</script>

</body>
</html>
